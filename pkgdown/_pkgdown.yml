url: https://scienceverse.github.io/metacheck/
development:
  mode: auto
template:
  # includes:
  #   in_header: <!-- inserted at the end of the head -->
  #   before_body: <!-- inserted at the beginning of the body -->
  #   after_body: <!-- inserted at the end of the body -->
  #   before_title: <!-- inserted before the package title in the header ->
  #   before_navbar: <!-- inserted before the navbar links -->
  #   after_navbar: <!-- inserted after the navbar links -->
  # light-switch: true
  bootstrap: 5
  bslib:
    preset: spacelab
    primary: '#327118'
    base_font: {google: "Open Sans"}
    heading_font: {google: "Open Sans"}
    code_font: {google: "Fira Code"}
  params:
    ganalytics: UA-160147578-1

navbar:
  structure:
    left: [home, gs, external, reference, articles, news]
  components:
    gs:
      text: Get Started
      href: articles/metacheck.html
    external:
      text: Example Report
      href: report-example.html

articles:
  - title: "Blog Posts"
    contents:
        - articles/intro
        - articles/jars
        - articles/osf
        - articles/aspredicted
  - title: "Articles"
    contents:
        - batch
        # - metascience
        # - articles/text_model
        - modules
        - creating_modules
        # - articles/validate
        - articles/github

